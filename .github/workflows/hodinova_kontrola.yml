# Ulož jako .github/workflows/lastminute.yml
# Pokud se tvůj skript jmenuje jinak než lastminute_bot.py, uprav poslední krok.
name: Last minute bot

on:
  schedule:
    # Každých 30 minut (repo je veřejné = minuty zdarma bez limitu).
    # Minuty 7 a 37 záměrně - v celou/půl jsou fronty GitHubu přetížené
    # a plánované běhy se zpožďují nebo přeskakují.
    - cron: "7,37 * * * *"
  workflow_dispatch: {}   # ruční spuštění tlačítkem

# Nikdy nesmí běžet dva běhy naráz - přepisovaly by si seen.json.
# cancel-in-progress: false = nový běh počká, rozběhnutý se nezabíjí.
concurrency:
  group: lastminute-bot
  cancel-in-progress: false

permissions:
  contents: write   # kvůli commitu seen.json/stats.json zpět do repa

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25   # pojistka proti visícímu prohlížeči
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python deps
        run: pip install -r requirements.txt

      # Cache Chromu (~150 MB) - bez ní se stahuje každý běh (~1 min).
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright Chromium
        run: playwright install --with-deps chromium

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python lastminute_bot.py

      # Uložení paměti bota zpět do repa. Pull --rebase řeší situaci, kdy
      # mezitím někdo (nebo jiný běh) pushnul - jinak by push spadl.
      - name: Commit state
        run: |
          git config user.name "lastminute-bot"
          git config user.email "actions@users.noreply.github.com"
          git add seen.json stats.json
          if git diff --cached --quiet; then
            echo "Žádná změna stavu."
          else
            git commit -m "chore: update bot state [skip ci]"
            git pull --rebase
            git push
          fi
